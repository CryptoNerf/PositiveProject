<style>
:root {
  --pink: #ff69b4; --blue: #4ec3ff;
  --blue-bg: #e6f4ff; --green: #6ee36e;
  --green-bg: #e9ffe9; --pink-bg: #ffecf4; --ink: #222;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: "Chalkboard SE","Comic Sans MS","Marker Felt",cursive; color: var(--ink); }
body {
  min-height: 100vh; padding: 12px 12px calc(12px + var(--safe-b));
  background: transparent;
  display: flex; flex-direction: column; justify-content: safe center; align-items: center;
}

/* ── bg ── */
.bg-grid { position:fixed;inset:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:0;z-index:-1;overflow:hidden;align-content:start; }
@media(max-width:560px){.bg-grid{grid-template-columns:repeat(auto-fill,minmax(80px,1fr));}}
.bg-grid img { width:100%;aspect-ratio:1/1;object-fit:cover;display:block; }

/* ── main card ── */
.container { width:100%;max-width:560px;background:#fff url("image/клеткафон.jpg") repeat;border:6px ridge var(--pink);padding:18px 18px 20px;position:relative;margin:0 auto; }
.container::before { content:"";position:absolute;inset:6px;border:3px dashed var(--blue);pointer-events:none; }
h1 { font-size:2rem;text-align:center;color:var(--pink);margin-bottom:2px;text-shadow:2px 2px 0 var(--blue);animation:wiggle 3s ease-in-out infinite; }
@keyframes wiggle { 0%,100%{transform:rotate(-1deg)}50%{transform:rotate(1.5deg)} }
.greeting { text-align:center;font-size:1rem;margin-bottom:6px; }
hr.divider { border:none;border-top:4px dotted var(--green);margin:10px 0; }
.streak { text-align:center;font-size:.95rem;padding:6px 14px;background:#fff;border:4px double var(--green);display:inline-block;margin:0 auto 6px;font-weight:bold; }
.streak-wrap { text-align:center; }

/* ── songs ── */
.songs { display:flex;flex-direction:column;gap:10px;margin-top:6px; }
.song { background:var(--blue-bg);padding:10px 12px;display:flex;align-items:center;gap:12px;border:5px double var(--blue);box-shadow:inset 0 0 0 2px #fff,0 2px 0 var(--blue);cursor:pointer;user-select:none;transition:background .2s,border-color .2s; }
.song:hover { background:#d4ecff; }
.song.active { border-color:var(--pink);background:var(--pink-bg);box-shadow:inset 0 0 0 2px #fff,0 2px 0 var(--pink); }
.song.done   { border-color:var(--green);background:var(--green-bg);box-shadow:inset 0 0 0 2px #fff,0 2px 0 var(--green); }
.play-btn { width:40px;height:40px;font-size:0;color:#fff;background:var(--blue);border:4px outset var(--blue);cursor:pointer;flex-shrink:0;padding:0;display:inline-flex;align-items:center;justify-content:center;gap:3px; }
.song.active .play-btn { background:var(--pink);border-color:var(--pink); }
.song.done   .play-btn { background:var(--green);border-color:var(--green); }
.play-btn:active { border-style:inset; }
.play-btn[data-state="play"]::before { content:"";display:block;width:0;height:0;border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px; }
.play-btn[data-state="pause"]::before,.play-btn[data-state="pause"]::after { content:"";display:block;width:3px;height:14px;background:#fff; }
.song .emoji{font-size:1.6rem;flex-shrink:0}.song .title{flex:1;font-size:.95rem;word-break:break-word;line-height:1.2}.song .status{font-size:1.2rem;flex-shrink:0}
audio { display:none; }
.big-btn { display:block;margin:14px auto 4px;padding:10px 28px;font-size:1.05rem;font-family:inherit;font-weight:bold;color:#fff;background:var(--pink);border:5px outset var(--pink);cursor:pointer; }
.big-btn:hover{background:var(--blue);border-color:var(--blue)}.big-btn:active{border-style:inset}.big-btn:disabled{opacity:.6;cursor:not-allowed}
.message { text-align:center;font-size:1rem;margin:10px 0 0;min-height:1.3em;color:var(--pink);font-weight:bold; }
.celebration { text-align:center;padding:14px 8px;border:4px dashed var(--pink);background:#fff; }
.celebration h2 { font-size:1.6rem;color:var(--blue);text-shadow:2px 2px 0 var(--pink);animation:wiggle 1.5s ease-in-out infinite; }
.celebration p { margin-top:8px;font-size:1rem; }
.hearts { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:10; }
.heart { position:absolute;font-size:2rem;animation:floatUp linear forwards;user-select:none; }
@keyframes floatUp { 0%{transform:translateY(0) rotate(0deg) scale(.8);opacity:1}100%{transform:translateY(-110vh) rotate(720deg) scale(1.4);opacity:0} }
.confetti { position:fixed;top:-20px;width:10px;height:14px;pointer-events:none;animation:fall linear forwards;z-index:9;border:1px solid #000; }
@keyframes fall { 0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:.9} }
.done-screen { text-align:center;padding:12px 4px;border:4px dashed var(--green);background:#fff; }
.done-screen .big-emoji { font-size:3rem;display:inline-block;animation:bounce 1.5s ease-in-out infinite; }
@keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)} }
.done-screen h2{font-size:1.4rem;margin:6px 0;color:var(--pink)}.done-screen p{font-size:.95rem;margin:6px 0}
.footer-note { text-align:center;margin-top:10px;font-size:.8rem;border-top:3px dotted var(--blue);padding-top:8px; }

/* ══ LOGIN ══ */
#login-overlay { position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(255,236,244,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px); }
.login-box { width:100%;max-width:340px;background:#fff url("image/клеткафон.jpg") repeat;border:6px ridge var(--pink);padding:24px 20px 20px;position:relative;text-align:center; }
.login-box::before { content:"";position:absolute;inset:6px;border:3px dashed var(--blue);pointer-events:none; }
.login-box h1 { font-size:1.7rem;margin-bottom:4px; }
.login-sub { font-size:.9rem;margin-bottom:14px; }
.login-input { display:block;width:100%;padding:8px 12px;margin:8px 0;font-family:inherit;font-size:16px;border:3px solid var(--blue);background:#fff;outline:none; }
.login-input:focus { border-color:var(--pink); }
.login-error { min-height:1.4em;color:#c0392b;font-size:.85rem;margin-top:6px;font-weight:bold; }

/* ══ CHAT FAB ══ */
#chat-fab { position:fixed;bottom:calc(24px + var(--safe-b));right:20px;width:54px;height:54px;font-size:1.5rem;font-family:inherit;background:var(--pink);color:#fff;border:4px outset var(--pink);cursor:pointer;z-index:100;display:none;align-items:center;justify-content:center;box-shadow:3px 3px 0 rgba(0,0,0,.2); }
#chat-fab:active { border-style:inset; }
#chat-fab.has-new::after { content:"●";position:absolute;top:-5px;right:-5px;color:var(--green);font-size:1rem;line-height:1; }

/* ══ CHAT DRAWER ══ */
#chat-drawer { position:fixed;top:0;left:0;right:0;height:var(--app-height,100dvh);z-index:150;display:flex;flex-direction:column;background:var(--pink-bg);transform:translateY(100%);visibility:hidden;pointer-events:none;will-change:transform;transition:transform .38s cubic-bezier(.4,0,.2,1),visibility 0s linear .38s; }
#chat-drawer.open { transform:translateY(0);visibility:visible;pointer-events:auto;transition:transform .38s cubic-bezier(.4,0,.2,1),visibility 0s linear 0s; }
.chat-hdr { display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--safe-t)) 14px 10px;background:var(--pink);border-bottom:4px solid var(--ink);flex-shrink:0;color:#fff;font-size:1.05rem;font-weight:bold; }
.chat-hdr span { font-size:1.05rem; }
.chat-hdr button { background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;font-family:inherit;padding:2px 6px;opacity:.9; }
.chat-hdr button:hover { opacity:1; }
.chat-hdr .online-dot { width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px; }
.chat-hdr .online-dot.on { background:var(--green); }
/* ⋯ settings dropdown */
.hdr-menu-wrap { position:relative; }
#hdr-menu-drop { display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:3px solid var(--pink);box-shadow:3px 3px 0 rgba(0,0,0,.15);z-index:10;min-width:130px;flex-direction:column; }
#hdr-menu-drop.open { display:flex; }
#hdr-menu-drop button { background:none;border:none;border-bottom:1px solid #fdd;color:var(--ink);font-family:inherit;font-size:.9rem;padding:10px 14px;cursor:pointer;text-align:left; }
#hdr-menu-drop button:last-child { border-bottom:none; }
#hdr-menu-drop button:hover { background:var(--pink-bg); }

/* messages */
#chat-messages { flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:6px;overscroll-behavior:contain; }
.date-div { text-align:center;font-size:.7rem;color:#999;padding:4px 0;flex-shrink:0;position:relative; }
.date-div::before,.date-div::after { content:"";position:absolute;top:50%;height:1px;background:#ddd;width:calc(50% - 44px); }
.date-div::before{left:0}.date-div::after{right:0}
.msg-wrap { display:flex;flex-direction:column; }
.msg-wrap.mine{align-items:flex-end}.msg-wrap.theirs{align-items:flex-start}
.msg-bubble { max-width:80%;padding:8px 12px;font-size:.92rem;line-height:1.4;word-break:break-word;background:#fff;cursor:default;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none; }
/* Emile = blue, Mari = pink — regardless of who's viewing */
.from-Emile .msg-bubble { border:3px double var(--blue); background:var(--blue-bg); }
.from-Mari  .msg-bubble { border:3px double var(--pink); background:var(--pink-bg); }
.msg-bubble img { max-width:100%;max-height:240px;display:block;cursor:zoom-in;border:2px solid #ddd;margin-top:2px; }
.msg-meta { font-size:.66rem;color:#aaa;margin-top:2px;padding:0 4px;display:flex;align-items:center;gap:4px; }
.msg-wrap.theirs .msg-meta { color:#888;font-weight:bold; }
.read-tick { color:#bbb;font-size:.7rem; }
.read-tick.read { color:var(--blue); }
.msg-reactions { display:flex;flex-wrap:wrap;gap:3px;padding:3px 4px 0; }
.react-chip { display:flex;align-items:center;gap:2px;padding:2px 7px;background:#fff;border:2px solid var(--blue);font-size:.82rem;cursor:pointer;user-select:none;transition:background .15s; }
.react-chip.mine { border-color:var(--pink);background:var(--pink-bg); }

/* typing indicator */
#typing-indicator { display:none;align-items:center;gap:8px;padding:6px 12px;font-size:.8rem;color:#888;font-style:italic;flex-shrink:0; }
#typing-indicator.show { display:flex; }
.t-dots { display:flex;gap:3px;align-items:center; }
.t-dots span { display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--blue);animation:tdot .8s infinite; }
.t-dots span:nth-child(2){animation-delay:.16s}.t-dots span:nth-child(3){animation-delay:.32s}
@keyframes tdot { 0%,100%{transform:translateY(0);opacity:.6}50%{transform:translateY(-4px);opacity:1} }

/* scroll-to-bottom */
#scroll-down { position:absolute;bottom:70px;right:14px;width:38px;height:38px;background:var(--pink);color:#fff;border:3px outset var(--pink);font-size:1rem;cursor:pointer;font-family:inherit;display:none;align-items:center;justify-content:center;z-index:5;box-shadow:2px 2px 0 rgba(0,0,0,.15); }
#scroll-down:active{border-style:inset}
#scroll-down.show{display:flex}

/* chat input */
.chat-bar { display:flex;gap:6px;padding:8px 10px calc(8px + var(--safe-b));background:#fff;border-top:4px solid var(--pink);flex-shrink:0;align-items:flex-end; }
.ci-btn { width:38px;height:38px;flex-shrink:0;font-size:1.15rem;background:var(--blue-bg);border:3px outset var(--blue);cursor:pointer;font-family:inherit;padding:0;display:flex;align-items:center;justify-content:center; }
.ci-btn:active{border-style:inset}
#chat-text { flex:1;min-width:0;padding:7px 10px;font-family:inherit;font-size:16px;border:3px solid var(--blue);outline:none;background:#fff;resize:none;max-height:100px;overflow-y:auto;line-height:1.3; }
#chat-text:focus{border-color:var(--pink)}
#chat-send-btn { width:38px;height:38px;flex-shrink:0;font-size:1rem;font-family:inherit;font-weight:bold;background:var(--pink);color:#fff;border:3px outset var(--pink);cursor:pointer;display:flex;align-items:center;justify-content:center; }
#chat-send-btn:active{border-style:inset}
.upload-ind { align-self:flex-end;font-size:.78rem;color:var(--pink);padding:5px 10px;border:2px dashed var(--pink);animation:pulse 1s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ══ EMOJI HINT TOAST ══ */
#emoji-hint { position:fixed;z-index:270;background:rgba(0,0,0,.72);color:#fff;font-size:.82rem;padding:6px 12px;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;font-family:"Chalkboard SE","Comic Sans MS",cursive; }
#emoji-hint.show { opacity:1; }

/* ══ REACT PICKER ══ */
#react-picker { position:fixed;z-index:260;background:#fff;border:3px solid var(--pink);padding:6px 8px;display:none;gap:4px;box-shadow:3px 3px 0 rgba(0,0,0,.15);border-radius:0; }
#react-picker.open{display:flex}
#react-picker button { font-size:1.5rem;background:none;border:2px solid transparent;cursor:pointer;padding:3px;font-family:"Apple Color Emoji","Segoe UI Emoji",serif; }
#react-picker button:hover{background:var(--pink-bg);border-color:var(--pink)}
#react-picker .rp-del { font-size:.9rem;color:#c0392b;border-color:#faa;background:#ffe0e0;padding:3px 7px;font-family:inherit; }

/* ══ EMOJI BUILDER ══ */
#emoji-builder { position:fixed;top:0;left:0;right:0;height:var(--app-height,100dvh);z-index:160;display:flex;flex-direction:column;background:var(--pink-bg);transform:translateY(100%);visibility:hidden;pointer-events:none;will-change:transform;transition:transform .38s cubic-bezier(.4,0,.2,1),visibility 0s linear .38s; }
#emoji-builder.open{transform:translateY(0);visibility:visible;pointer-events:auto;transition:transform .38s cubic-bezier(.4,0,.2,1),visibility 0s linear 0s;}
.bldr-hdr { display:flex;align-items:center;justify-content:space-between;padding:calc(10px + var(--safe-t)) 14px 10px;background:var(--blue);border-bottom:4px solid var(--ink);flex-shrink:0;color:#fff;font-size:1.05rem;font-weight:bold; }
.bldr-hdr button { background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;font-family:inherit;padding:2px 6px; }
/* builder toolbar */
.bldr-toolbar { display:flex;gap:6px;padding:7px 10px;background:#fff;border-bottom:2px dotted var(--blue);align-items:center;flex-shrink:0;flex-wrap:wrap; }
.bldr-toolbar label { font-size:.75rem;color:#888;white-space:nowrap; }
#size-slider { flex:1;min-width:70px;accent-color:var(--pink);cursor:pointer;height:4px; }
.rot-btn { width:32px;height:32px;font-size:1rem;background:var(--blue-bg);border:2px outset var(--blue);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.rot-btn:active{border-style:inset}
#bg-color { width:32px;height:32px;border:3px solid var(--blue);padding:0;cursor:pointer;background:none;flex-shrink:0; }

.canvas-wrap { flex:1;display:flex;align-items:center;justify-content:center;padding:8px;overflow:hidden; }
#collage-canvas { border:5px double var(--pink);background:#fff;touch-action:none;cursor:crosshair;max-width:calc(100vw - 16px);max-height:100%; }

.bldr-actions { display:flex;gap:6px;padding:8px 10px calc(8px + var(--safe-b));background:#fff;border-top:3px dotted var(--pink);flex-shrink:0;justify-content:center;flex-wrap:wrap; }
.bldr-actions button { padding:6px 12px;font-family:inherit;font-size:.88rem;font-weight:bold;border:3px outset var(--blue);background:var(--blue-bg);cursor:pointer; }
.bldr-actions button:active{border-style:inset}
#send-collage-btn{background:var(--pink)!important;border-color:var(--pink)!important;color:#fff!important}
#del-emoji-btn{background:#ffe0e0!important;border-color:#f88!important}

/* ══ LIGHTBOX ══ */
#lightbox { position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;cursor:zoom-out; }
#lightbox.open{display:flex}
#lightbox img { max-width:95vw;max-height:95vh;border:4px solid #fff;object-fit:contain; }

/* ══ MOBILE ══ */
@media(max-width:560px){
  body{padding:8px 8px calc(8px + var(--safe-b))}
  .container{max-width:92vw;padding:12px 12px 14px}
  .container::before{inset:4px;border-width:2px}
  h1{font-size:1.5rem}.greeting{font-size:.85rem;margin-bottom:2px}
  hr.divider{margin:6px 0;border-top-width:3px}
  .streak{font-size:.8rem;padding:4px 10px;border-width:3px}
  .songs{gap:7px;margin-top:4px}
  .song{padding:7px 9px;gap:9px;border-width:4px}
  .play-btn{width:34px;height:34px;border-width:3px}
  .play-btn[data-state="play"]::before{border-left-width:9px;border-top-width:6px;border-bottom-width:6px;margin-left:2px}
  .play-btn[data-state="pause"]::before,.play-btn[data-state="pause"]::after{width:2.5px;height:12px}
  .song .emoji{font-size:1.3rem}.song .title{font-size:.8rem}.song .status{font-size:1rem}
  .footer-note{font-size:.7rem;margin-top:6px;padding-top:5px}
  .celebration h2{font-size:1.3rem}.celebration p{font-size:.9rem}
  .big-btn{font-size:.95rem;padding:8px 22px;margin:10px auto 2px}
}
@media(max-height:640px){h1{font-size:1.4rem}.songs{gap:6px}.song{padding:6px 8px}.footer-note{display:none}}
</style>
</head>
<body>

<div class="bg-grid" id="bgGrid"></div>
<div class="hearts" id="heartsLayer"></div>

<!-- ══ LOGIN ══ -->
<div id="login-overlay">
  <div class="login-box">
    <h1>~ Positive Project ~</h1>
    <p class="login-sub">Добро пожаловать ✨</p>
    <hr class="divider">
    <input class="login-input" id="login-name" type="text" placeholder="Имя"
           autocomplete="username" autocapitalize="none" spellcheck="false">
    <input class="login-input" id="login-pass" type="password"
           placeholder="Пароль" autocomplete="current-password">
    <button class="big-btn" id="login-btn" style="margin:12px auto 0">Войти!</button>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- ══ MAIN CARD ══ -->
<div class="container" id="main-container" style="display:none">
  <h1>~ Positive Project ~</h1>
  <hr class="divider">
  <div class="streak-wrap"><div class="streak" id="streak">Твой стрик: 0 дней</div></div>
  <div id="main"></div>
  <p class="footer-note">🎶 Музыка исцеляет душу 🎶</p>
</div>

<!-- ══ CHAT FAB ══ -->
<button id="chat-fab" aria-label="Открыть чат">💬</button>

<!-- ══ CHAT DRAWER ══ -->
<div id="chat-drawer">
  <div class="chat-hdr">
    <div style="display:flex;align-items:center;gap:6px">
      <span class="online-dot" id="partner-dot"></span>
      <span>💬 Чат</span>
    </div>
    <div style="display:flex;gap:2px;align-items:center">
      <div class="hdr-menu-wrap">
        <button id="hdr-menu-btn" title="Меню">⋯</button>
        <div id="hdr-menu-drop">
          <button id="logout-btn">🚪 Выйти</button>
        </div>
      </div>
      <button id="close-chat-btn" title="Закрыть">✕</button>
    </div>
  </div>
  <div id="chat-messages" style="position:relative">

(function() {
  let maxH = 0;
  function setH() {
    const h = window.innerHeight;
    if (h > maxH) {
      maxH = h;
      document.documentElement.style.setProperty('--app-height', h + 'px');
    }
  }
  setH();
  window.addEventListener('resize', setH);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', setH);
})();

async function doLogin() {
  const key   = document.getElementById("login-name").value.trim().toLowerCase();

  const errEl = document.getElementById("login-error");
  const btn   = document.getElementById("login-btn");

  btn.disabled = true; btn.textContent = "Входим...";
  const { email } = USERS[key];
  try {
    await auth.signInWithEmailAndPassword(email, pwd);

function closeChat() {

function startChatListener() {
  if (chatUnsub) return;
  listenStart = Date.now();
  const list = document.getElementById("chat-messages");
  // clear old messages (keep scroll-down button)
  [...list.childNodes].forEach(n => { if (n.id !== "scroll-down") n.remove(); });
  msgMap.clear(); lastDateKey = "";

  chatUnsub = db.collection("messages")
    .orderBy("createdAt", "asc")
    .onSnapshot(snap => {
      snap.docChanges().forEach(ch => {
        if (ch.type === "added") {
          const el = buildMsgEl(ch.doc.id, ch.doc.data());
          list.insertBefore(el, document.getElementById("scroll-down"));
          const msgMs = ch.doc.data().createdAt ? ch.doc.data().createdAt.toDate().getTime() : 0;
          const isNew = msgMs > listenStart;
          if (isNew && !document.getElementById("chat-drawer").classList.contains("open")) {
            document.getElementById("chat-fab").classList.add("has-new");
            playPing();
          }
        } else if (ch.type === "modified") {
          const entry = msgMap.get(ch.doc.id);
          if (entry) updateReactions(entry.wrap, ch.doc.data().reactions || {});
        } else if (ch.type === "removed") {
          const entry = msgMap.get(ch.doc.id);
          if (entry) { entry.wrap.remove(); msgMap.delete(ch.doc.id); }
        }
      });
      scrollBottom();
    }, err => console.error("chat:", err));
}
function stopChatListener() {
  if (chatUnsub) { chatUnsub(); chatUnsub = null; }
  const list = document.getElementById("chat-messages");
  [...list.childNodes].forEach(n => { if (n.id !== "scroll-down") n.remove(); });
  msgMap.clear(); lastDateKey = "";
}

// ─ Message element ─────────────────────────
function buildMsgEl(docId, data) {
  const isMine     = data.username === currentUsername;
  const senderClass = "from-" + (data.username || "Emile");
  const ts         = data.createdAt ? data.createdAt.toDate() : null;

  // date divider
  const dk = ts ? ts.toDateString() : "";
  if (dk && dk !== lastDateKey) {
    lastDateKey = dk;
    const div = document.createElement("div");
    div.className = "date-div";
    div.textContent = dateDivLabel(ts);
    const list = document.getElementById("chat-messages");
    list.insertBefore(div, document.getElementById("scroll-down"));
  }

  const wrap   = document.createElement("div");
  wrap.className = "msg-wrap " + (isMine ? "mine" : "theirs") + " " + senderClass;
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";

  if (data.imageUrl) {
    const img = document.createElement("img");
    img.src = data.imageUrl; img.loading = "lazy"; img.alt = "картинка";
    img.onclick = () => openLightbox(data.imageUrl);
    bubble.appendChild(img);
  }
  if (data.text) {
    const p = document.createElement("p"); p.textContent = data.text;
    bubble.appendChild(p);
  }

  const meta = document.createElement("div");
  meta.className = "msg-meta";
  const timeSpan = document.createElement("span");
  timeSpan.textContent = ts ? fmtTime(ts) : "";
  meta.appendChild(timeSpan);
  if (isMine) {
    const tick = document.createElement("span");
    tick.className = "read-tick";
    tick.textContent = "✓";
    meta.appendChild(tick);
  } else {
    const nameSpan = document.createElement("span");
    nameSpan.textContent = data.username;
    meta.prepend(nameSpan, document.createTextNode(" · "));
  }

  const reactDiv = document.createElement("div");
  reactDiv.className = "msg-reactions";

  wrap.appendChild(bubble);
  wrap.appendChild(meta);
  wrap.appendChild(reactDiv);

  // Long-press for reactions / delete
  setupLongPress(wrap, bubble, docId, isMine, data);

  msgMap.set(docId, { wrap, ts, isMine, data });
  updateReactions(wrap, data.reactions || {});
  if (isMine && ts) updateReadTick(wrap, ts);
  return wrap;
}

function dateDivLabel(d) {
  const t = new Date(); t.setHours(0,0,0,0);
  const y = new Date(t); y.setDate(y.getDate()-1);
  if (d.toDateString() === t.toDateString()) return "Сегодня";
  if (d.toDateString() === y.toDateString()) return "Вчера";
  return d.toLocaleDateString("ru-RU", { day:"numeric", month:"long" });
}

function fmtTime(d) {
  return d.toLocaleTimeString("ru-RU", { hour:"2-digit", minute:"2-digit" });
}

// ─ Read receipts ───────────────────────────
function markRead() {
  if (!currentUser) return;

function updateReadTick(wrap, ts) {
  if (!partnerLastRead || !ts) return;
  const tick = wrap.querySelector(".read-tick");
  if (!tick) return;
  if (ts <= partnerLastRead) { tick.textContent = "✓✓"; tick.className = "read-tick read"; }
  else                       { tick.textContent = "✓";  tick.className = "read-tick"; }
}

function refreshAllTicks() {
  for (const [, entry] of msgMap) {
    if (entry.isMine && entry.ts) updateReadTick(entry.wrap, entry.ts);

}

// ─ Notification sound ──────────────────────
function playPing() {
  try {
    const ac  = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = "sine";
    osc.frequency.setValueAtTime(880, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(660, ac.currentTime + 0.12);
    g.gain.setValueAtTime(0.25, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.28);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.3);
  } catch(_) {}
}

// ─ Reactions ───────────────────────────────
const REACT_EMOJIS = ["❤️","😂","😍","🥺","😮","🔥","👍","🎉"];
let longPressTimer = null;
let longPressData  = null;

function setupLongPress(wrap, bubble, docId, isMine, data) {
  const start = e => {
    if (e.button && e.button !== 0) return;
    longPressData = { docId, isMine, data, x: (e.clientX||e.touches?.[0]?.clientX||0), y: (e.clientY||e.touches?.[0]?.clientY||0) };
    longPressTimer = setTimeout(() => showReactPicker(longPressData), 500);
  };
  const cancel = () => { clearTimeout(longPressTimer); longPressData = null; };
  bubble.addEventListener("mousedown",  start);
  bubble.addEventListener("touchstart", e => { start(e); }, { passive:true });
  bubble.addEventListener("mouseup",    cancel);
  bubble.addEventListener("mouseleave", cancel);
  bubble.addEventListener("touchend",   cancel);
  bubble.addEventListener("touchcancel",cancel);
  bubble.addEventListener("contextmenu", e => e.preventDefault());
}

function showReactPicker({ docId, isMine, data, x, y }) {
  const picker = document.getElementById("react-picker");
  picker.innerHTML = "";
  REACT_EMOJIS.forEach(em => {
    const b = document.createElement("button"); b.textContent = em;
    b.onclick = () => { toggleReaction(docId, em); closePicker(); };
    picker.appendChild(b);
  });
  if (isMine) {
    const del = document.createElement("button"); del.className = "rp-del";
    del.textContent = "🗑 Удалить";
    del.onclick = () => { deleteMessage(docId, data); closePicker(); };
    picker.appendChild(del);
  }
  // Position near touch point, keep within screen
  const pw = 220, ph = 60;
  let px = Math.min(x, window.innerWidth  - pw - 8);
  let py = y - ph - 10;
  if (py < 8) py = y + 10;
  picker.style.left = px + "px";
  picker.style.top  = py + "px";
  picker.classList.add("open");
  setTimeout(() => document.addEventListener("click", closePicker, { once:true }), 50);
}
function closePicker() {
  document.getElementById("react-picker").classList.remove("open");
}

async function toggleReaction(docId, emoji) {
  if (!currentUser) return;
  const ref  = db.collection("messages").doc(docId);
  const snap = await ref.get();
  if (!snap.exists) return;
  const reactions = snap.data().reactions || {};
  const uids = reactions[emoji] || [];
  const uid  = currentUser.uid;
  const next = uids.includes(uid) ? uids.filter(u => u !== uid) : [...uids, uid];
  const update = {};
  update["reactions." + emoji] = next.length ? next : firebase.firestore.FieldValue.delete();
  await ref.update(update).catch(()=>{});
}

async function deleteMessage(docId, data) {
  try {
    if (data.imageUrl) {
      try { await storage.refFromURL(data.imageUrl).delete(); } catch(_) {}
    }
    await db.collection("messages").doc(docId).delete();
  } catch(e) { console.error(e); }
}

function updateReactions(wrap, reactions) {
  const div = wrap.querySelector(".msg-reactions");
  if (!div) return;
  div.innerHTML = "";
  for (const [em, uids] of Object.entries(reactions)) {
    if (!uids || !uids.length) continue;
    const chip = document.createElement("div");
    chip.className = "react-chip" + (currentUser && uids.includes(currentUser.uid) ? " mine" : "");
    chip.textContent = em + " " + uids.length;
    chip.onclick = () => toggleReaction(
      [...msgMap.entries()].find(([,v]) => v.wrap === wrap)?.[0],
      em
    );
    div.appendChild(chip);
  }
}

// ─ Emoji hint toast (desktop only) ─────────
let hintTimer;
function showEmojiHint(clientX, clientY) {
  const el = document.getElementById("emoji-hint");
  el.style.left = (clientX + 12) + "px";
  el.style.top  = (clientY - 36) + "px";
  el.classList.add("show");
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => el.classList.remove("show"), 2200);
}
function closeFloatPicker() {} // no-op, kept so closeBuilder() doesn't break

// Touch device detection
const isTouch = () => navigator.maxTouchPoints > 0 || "ontouchstart" in window;

// Where to place the next emoji tapped from keyboard
let pendingPos = null;

// Extract individual grapheme-cluster emojis from a string
function extractEmojis(str) {
  if (!str) return [];
  if (typeof Intl !== "undefined" && Intl.Segmenter) {
    const seg = new Intl.Segmenter("en", { granularity: "grapheme" });
    return [...seg.segment(str)]
      .map(s => s.segment)
      .filter(g => /\p{Emoji}/u.test(g) && g.trim() !== "");
  }
  // fallback regex for older Safari
  return [...(str.match(/\p{Emoji_Presentation}[\p{Emoji_Modifier}️⃣]?(?:‍\p{Emoji_Presentation}[\p{Emoji_Modifier}️⃣]?)*/gu) || [])];
}

// Native emoji keyboard input
const emojiInput = document.getElementById("emoji-input");
emojiInput.addEventListener("input", function () {
  const val = this.value;
  this.value = "";
  const emjs = extractEmojis(val);
  if (!emjs.length) return;
  emjs.forEach((char, i) => {
    const cx = pendingPos ? pendingPos.x + i * 18 : 70 + Math.random() * (cvs.width  - 140);
    const cy = pendingPos ? pendingPos.y + i * 18 : 70 + Math.random() * (cvs.height - 140);
    emojis.push({ char, cx, cy, size: 56, rot: 0 });
    selIdx = emojis.length - 1;
  });
  pendingPos = null;
  redraw(); updateSlider();
});

// ─ Canvas ──────────────────────────────────
const cvs = document.getElementById("collage-canvas");
const ctx = cvs.getContext("2d");
let emojis   = [], selIdx = -1;
let isDragging = false, dOff = { x:0, y:0 };
let canvasBg = "#ffffff";
let activePointers = new Map();
let pinchStart = { dist:0, size:0 };

function redraw() {
  ctx.clearRect(0, 0, cvs.width, cvs.height);
  ctx.fillStyle = canvasBg;
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  if (emojis.length === 0) {
    ctx.save();
    ctx.textAlign    = "center";
    ctx.textBaseline = "middle";
    ctx.fillStyle    = "rgba(0,0,0,0.18)";
    ctx.font         = "18px 'Chalkboard SE','Comic Sans MS',cursive";
    ctx.fillText("Нажми на холст",       cvs.width/2, cvs.height/2 - 24);
    ctx.fillText("и выбери эмодзи ✌️",  cvs.width/2, cvs.height/2 + 4);
    ctx.font      = "42px serif";
    ctx.fillStyle = "rgba(0,0,0,0.09)";
    ctx.fillText("🎨", cvs.width/2, cvs.height/2 + 64);
    ctx.restore();
  }
  emojis.forEach((e, i) => {
    ctx.save();
    ctx.translate(e.cx, e.cy);
    ctx.rotate(e.rot || 0);
    ctx.font = e.size + "px 'Apple Color Emoji','Segoe UI Emoji',serif";
    ctx.textAlign    = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(e.char, 0, 0);
    if (i === selIdx) {
      const r = e.size * 0.58;
      ctx.strokeStyle = "rgba(255,105,180,.85)";
      ctx.lineWidth = 2;
      ctx.setLineDash([5,4]);
      ctx.strokeRect(-r, -r, r*2, r*2);
      ctx.setLineDash([]);
    }
    ctx.restore();
  });
}

function cvsXY(clientX, clientY) {
  const rc = cvs.getBoundingClientRect();
  return {
    x: (clientX - rc.left) * (cvs.width  / rc.width),
    y: (clientY - rc.top)  * (cvs.height / rc.height)
  };
}

function hitTest(x, y) {
  for (let i = emojis.length-1; i >= 0; i--) {
    const e = emojis[i];
    const cos = Math.cos(-(e.rot||0)), sin = Math.sin(-(e.rot||0));
    const dx = x-e.cx, dy = y-e.cy;
    const lx = dx*cos - dy*sin, ly = dx*sin + dy*cos;
    if (Math.abs(lx) < e.size*.6 && Math.abs(ly) < e.size*.6) return i;
  }
  return -1;
}

function pinchDist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

cvs.addEventListener("pointerdown", e => {
  e.preventDefault();
  activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (activePointers.size === 1) {
    const {x,y} = cvsXY(e.clientX, e.clientY);
    const hit = hitTest(x, y);
    if (hit !== -1) {
      // Select & start dragging existing emoji
      const [em] = emojis.splice(hit, 1); emojis.push(em);
      selIdx = emojis.length-1; isDragging = true;
      dOff = { x: x-em.cx, y: y-em.cy };
    } else {
      // Tap on empty space — remember canvas position
      selIdx = -1; isDragging = false;
      pendingPos = { x, y };
      // Always focus input — on iOS opens emoji keyboard, on Mac enables Ctrl+⌘+Space
      emojiInput.focus();
      // On desktop show hint with shortcut
      if (!isTouch()) showEmojiHint(e.clientX, e.clientY);
    }
    redraw(); updateSlider();
  } else if (activePointers.size === 2 && selIdx !== -1) {
    const pts = [...activePointers.values()];
    pinchStart = { dist: pinchDist(pts[0], pts[1]), size: emojis[selIdx].size };
    isDragging = false;
  }
}, { passive:false });

cvs.addEventListener("pointermove", e => {
  e.preventDefault();
  activePointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if (activePointers.size === 2 && selIdx !== -1) {
    const pts = [...activePointers.values()];
    const curr = pinchDist(pts[0], pts[1]);
    if (pinchStart.dist > 0) {
      emojis[selIdx].size = Math.max(16, Math.min(120, pinchStart.size * (curr / pinchStart.dist)));
    }
    redraw(); updateSlider();
  } else if (isDragging && selIdx !== -1) {
    const {x,y} = cvsXY(e.clientX, e.clientY);
    emojis[selIdx].cx = x - dOff.x;
    emojis[selIdx].cy = y - dOff.y;
    redraw();
  }
}, { passive:false });

cvs.addEventListener("pointerup",     e => { activePointers.delete(e.pointerId); if (!activePointers.size) isDragging = false; });
cvs.addEventListener("pointercancel", e => { activePointers.delete(e.pointerId); isDragging = false; });

// iOS blurs focused inputs when a touch ends on a non-input element.
// preventDefault() on touchend blocks that cleanup, keeping keyboard open.
cvs.addEventListener("touchend", e => {
  if (pendingPos !== null && !isDragging) e.preventDefault();
}, { passive: false });
cvs.setPointerCapture = cvs.setPointerCapture || (() => {});

function addEmojiToCanvas(char) {
  const cx = 70 + Math.random() * (cvs.width  - 140);
  const cy = 70 + Math.random() * (cvs.height - 140);
  emojis.push({ char, cx, cy, size:52, rot:0 });
  selIdx = emojis.length-1;
  redraw(); updateSlider();
}

function updateSlider() {
  const sl = document.getElementById("size-slider");
  sl.value = selIdx !== -1 ? Math.round(emojis[selIdx].size) : 52;
  sl.disabled = selIdx === -1;
}

// Controls
document.getElementById("open-builder-btn").onclick  = openBuilder;
document.getElementById("close-builder-btn").onclick = closeBuilder;

document.getElementById("size-slider").oninput = function() {
  if (selIdx !== -1) { emojis[selIdx].size = +this.value; redraw(); }
};
document.getElementById("rot-l-btn").onclick = () => {
  if (selIdx !== -1) { emojis[selIdx].rot = (emojis[selIdx].rot||0) - Math.PI/12; redraw(); }
};
document.getElementById("rot-r-btn").onclick = () => {
  if (selIdx !== -1) { emojis[selIdx].rot = (emojis[selIdx].rot||0) + Math.PI/12; redraw(); }
};
document.getElementById("bg-color").oninput = function() { canvasBg = this.value; redraw(); };

document.getElementById("undo-btn").onclick = () => {
  if (emojis.length) { emojis.pop(); selIdx = -1; redraw(); updateSlider(); }
};
document.getElementById("del-emoji-btn").onclick = () => {
  if (selIdx !== -1) { emojis.splice(selIdx,1); selIdx=-1; redraw(); updateSlider(); }
};
document.getElementById("dup-emoji-btn").onclick = () => {
  if (selIdx !== -1) {
    const e = emojis[selIdx];
    emojis.push({ ...e, cx: e.cx+22, cy: e.cy+22 });
    selIdx = emojis.length-1; redraw();
  }
};
document.getElementById("clear-canvas-btn").onclick = () => {
  emojis=[]; selIdx=-1; redraw(); updateSlider();
};
document.getElementById("send-collage-btn").onclick = () => {
  if (!emojis.length) return;
  selIdx = -1; redraw();
  cvs.toBlob(blob => {
    closeBuilder();
    uploadAndSend(new File([blob], "collage.png", { type:"image/png" }));
  }, "image/png");
};

function openBuilder()  {
  redraw();
  document.getElementById("emoji-builder").classList.add("open");
  document.body.style.overflow = 'hidden';
}
function closeBuilder() {
  document.getElementById("emoji-builder").classList.remove("open");
  document.body.style.overflow = '';
  closeFloatPicker();
  emojiInput.blur();
  pendingPos = null;
}

function buildBackground() {
  const grid = document.getElementById("bgGrid"); grid.innerHTML = "";
  const tile = window.innerWidth <= 560 ? 80 : 140;
  const cols = Math.ceil(window.innerWidth/tile)+1, rows = Math.ceil(window.innerHeight/tile)+1;

  for (let i=0; i<cols*rows; i++) {

function currentDayStamp() {
  const d=new Date(); return Math.floor(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())/86400000);
}
function parseLegacyDayKey(k) {
  if (!k||!/^\d{4}-\d{2}-\d{2}$/.test(k)) return null;
  const [yy,mm,dd]=k.split("-").map(Number); return Math.floor(Date.UTC(yy,mm-1,dd)/86400000);
}
function dayStampToLegacyKey(s) {
  const d=new Date(s*86400000);
  return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0")+"-"+String(d.getUTCDate()).padStart(2,"0");
}
function getState() {
  let l=Number.parseInt(localStorage.getItem("pp_lastListenDay")||"",10);
  if (!Number.isFinite(l)){const m=parseLegacyDayKey(localStorage.getItem("pp_lastListen"));if(Number.isFinite(m)){l=m;localStorage.setItem("pp_lastListenDay",String(m));}else l=null;}
  let s=Number.parseInt(localStorage.getItem("pp_streak")||"0",10);
  if(!Number.isFinite(s)||s<0)s=0; return{lastListenDay:l,streak:s};
}
function markListened() {
  const st=getState(),today=currentDayStamp(); let s=st.streak;
  if(st.lastListenDay===today-1)s++;else if(st.lastListenDay===today){}else s=1;
  localStorage.setItem("pp_lastListenDay",String(today));
  localStorage.setItem("pp_lastListen",dayStampToLegacyKey(today));
  localStorage.setItem("pp_streak",String(s));
}
function updateStreakBadge() {
  const {streak:s}=getState();
  document.getElementById("streak").textContent="🔥 Твой стрик: "+s+(s===1?" день":s>=2&&s<=4?" дня":" дней");
}

const mainEl = document.getElementById("main");

function renderAlreadyDone() {
  mainEl.innerHTML=`<div class="done-screen"><div class="big-emoji">🎉</div><h2>Ты уже послушала сегодня!</h2><p>Ты большая молодец!</p><p style="font-size:2rem;margin-top:14px">💖🌸🦄🌈🐥</p><button class="big-btn" id="againBtn">Хочу ещё раз!</button></div>`;
  document.getElementById("againBtn").onclick=()=>renderPlaylist(true); launchHearts(40);
}

function renderPlaylist(bonus=false) {
  let html=bonus?`<p class="message">Бонус-сессия!</p>`:"";
  html+=`<div class="songs">`;
  SONGS.forEach((s,i)=>{ html+=`<div class="song" data-i="${i}"><button class="play-btn" type="button" aria-label="Играть" data-state="play"></button><div class="emoji">${s.emoji}</div><div class="title">${s.title}</div><div class="status">⏳</div></div>`; });
  html+=`</div><p class="message" id="msg">Выбери трек, который хочешь послушать</p><audio id="player" preload="auto"></audio>`;
  mainEl.innerHTML=html;
  const player=document.getElementById("player"), msg=document.getElementById("msg");
  const listened=new Set(), preloaded=new Map(); let currentIndex=-1;
  function preloadSong(i){if(i<0||i>=SONGS.length||preloaded.has(i))return;const a=new Audio();a.preload="auto";a.src=SONGS[i].file;a.load();preloaded.set(i,a);}
  function preloadAround(i){preloadSong(i);preloadSong((i+1)%SONGS.length);preloadSong((i+2)%SONGS.length);}
  preloadAround(0);
  function setBtn(i,s){const el=document.querySelector(`.song[data-i="${i}"]`);if(el)el.querySelector(".play-btn").dataset.state=s;}
  function playSong(i) {
    if(currentIndex===i&&!player.paused&&!player.ended){player.pause();setBtn(i,"play");return;}
    if(currentIndex===i&&player.paused&&player.src){player.play().catch(()=>{});setBtn(i,"pause");return;}
    if(currentIndex!==-1){const p=document.querySelector(`.song[data-i="${currentIndex}"]`);if(p){p.classList.remove("active");if(!p.classList.contains("done"))setBtn(currentIndex,"play");}}
    const el=document.querySelector(`.song[data-i="${i}"]`);
    el.classList.add("active");setBtn(i,"pause");currentIndex=i;msg.textContent=SONGS[i].quote;
    player.src=SONGS[i].file;player.play().catch(()=>{});preloadAround(i);
    if(!bonus){markListened();updateStreakBadge();}
  }
  document.querySelectorAll(".song").forEach(el=>{
    const i=parseInt(el.dataset.i,10);
    el.addEventListener("click",()=>playSong(i));
    el.querySelector(".play-btn").addEventListener("click",ev=>{ev.stopPropagation();playSong(i);});
  });
  player.onended=()=>{
    if(currentIndex===-1)return; const fin=currentIndex;
    const el=document.querySelector(`.song[data-i="${fin}"]`);
    if(el){el.classList.remove("active");el.classList.add("done");el.querySelector(".status").textContent="✅";setBtn(fin,"play");}
    launchHearts(12); listened.add(fin); currentIndex=-1;
    if(listened.size===SONGS.length){setTimeout(renderCelebration,700);return;}
    let next=-1;
    for(let k=1;k<=SONGS.length;k++){const c=(fin+k)%SONGS.length;if(!listened.has(c)){next=c;break;}}
    if(next!==-1)setTimeout(()=>playSong(next),900);
  };
}

function renderCelebration() {
  updateStreakBadge();
  const fm=FINAL_MESSAGES[Math.floor(Math.random()*FINAL_MESSAGES.length)];
  mainEl.innerHTML=`<div class="celebration"><h2>🎊 Ураааа! 🎊</h2><p>${fm}</p><p style="font-size:2.4rem;margin-top:16px">🦄💖🌈✨🐱🐶🧸</p><button class="big-btn" id="againBtn">Ещё разочек 💕</button></div>`;
  document.getElementById("againBtn").onclick=()=>renderPlaylist(true); partyMode();
}

function launchHearts(n) {
  const layer=document.getElementById("heartsLayer");
  const emj=["💖","💕","💗","💘","🌸","✨","🌷","🦄","🎀","⭐"];
  for(let i=0;i<n;i++){
    const h=document.createElement("div"); h.className="heart";
    h.textContent=emj[Math.floor(Math.random()*emj.length)];
    h.style.left=(Math.random()*100)+"vw"; h.style.bottom="-40px";
    h.style.fontSize=(1.2+Math.random()*2)+"rem";
    h.style.animationDuration=(3+Math.random()*3)+"s";
    layer.appendChild(h); setTimeout(()=>h.remove(),7000);
  }
}
function partyMode() {
  launchHearts(60);
  const colors=["#ff477e","#ff6fae","#b794f4","#4cc9f0","#caffbf","#fff3b0","#ffd3e0"];
  for(let i=0;i<120;i++){
    const c=document.createElement("div"); c.className="confetti";
    c.style.left=(Math.random()*100)+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2.5+Math.random()*2.5)+"s";
    c.style.animationDelay=(Math.random()*1.2)+"s";
    c.style.transform="rotate("+(Math.random()*360)+"deg)";
    document.body.appendChild(c); setTimeout(()=>c.remove(),6000);
  }
}
