<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8C%B8%3C/text%3E%3C/svg%3E">

<style>
  :root {
    --pink:  #ff69b4;
    --blue:  #4ec3ff;
    --blue-bg: #e6f4ff;
    --green: #6ee36e;
    --green-bg: #e9ffe9;
    --pink-bg: #ffecf4;
    --ink:   #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: "Chalkboard SE", "Comic Sans MS", "Marker Felt", cursive;
    color: var(--ink);
  }

  body {
    min-height: 100vh;
    padding: 12px 12px;
    background: transparent;
    display: flex;
    flex-direction: column;
    justify-content: safe center;
    align-items: center;
  }

  /* ---------- Collage background (квадраты, плотная сетка) ---------- */
  .bg-grid {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0;
    z-index: -1;
    overflow: hidden;
    align-content: start;
  }
  @media (max-width: 560px) {
    .bg-grid {
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    }
  }
  .bg-grid img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
  }

  /* ---------- Main card — web 1.0 style ---------- */
  .container {
    width: 100%;
    max-width: 560px;
    background: #ffffff url("image/клеткафон.jpg") repeat;
    border: 6px ridge var(--pink);
    padding: 18px 18px 20px;
    position: relative;
    margin: 0 auto;
  }
  .container::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 3px dashed var(--blue);
    pointer-events: none;
  }

  h1 {
    font-size: 2rem;
    text-align: center;
    color: var(--pink);
    margin-bottom: 2px;
    text-shadow: 2px 2px 0 var(--blue);
    animation: wiggle 3s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-1deg); }
    50% { transform: rotate(1.5deg); }
  }

  .greeting {
    text-align: center;
    font-size: 1rem;
    margin-bottom: 6px;
    color: var(--ink);
  }

  hr.divider {
    border: none;
    border-top: 4px dotted var(--green);
    margin: 10px 0;
  }

  .streak {
    text-align: center;
    font-size: 0.95rem;
    padding: 6px 14px;
    background: #fff;
    border: 4px double var(--green);
    display: inline-block;
    margin: 0 auto 6px;
    font-weight: bold;
    color: var(--ink);
  }
  .streak-wrap { text-align: center; }

  /* ---------- Songs: голубые с красивой двойной обводкой ---------- */
  .songs {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 6px;
  }
  .song {
    background: var(--blue-bg);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 5px double var(--blue);
    box-shadow: inset 0 0 0 2px #fff, 0 2px 0 var(--blue);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .song:hover { background: #d4ecff; }
  .song.active {
    border-color: var(--pink);
    background: var(--pink-bg);
    box-shadow: inset 0 0 0 2px #fff, 0 2px 0 var(--pink);
  }
  .song.done {
    border-color: var(--green);
    background: var(--green-bg);
    box-shadow: inset 0 0 0 2px #fff, 0 2px 0 var(--green);
  }

  .play-btn {
    width: 40px; height: 40px;
    font-size: 0;
    font-family: inherit;
    color: #fff;
    background: var(--blue);
    border: 4px outset var(--blue);
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
  }
  .song.active .play-btn { background: var(--pink); border-color: var(--pink); }
  .song.done   .play-btn { background: var(--green); border-color: var(--green); }
  .play-btn:active { border-style: inset; }

  /* Иконки play/pause чистым CSS — чтобы iOS не рендерил их как эмодзи */
  .play-btn[data-state="play"]::before {
    content: "";
    display: block;
    width: 0; height: 0;
    border-left: 11px solid #fff;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    margin-left: 3px;
  }
  .play-btn[data-state="pause"]::before,
  .play-btn[data-state="pause"]::after {
    content: "";
    display: block;
    width: 3px;
    height: 14px;
    background: #fff;
  }

  .song .emoji {
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .song .title {
    flex: 1;
    font-size: 0.95rem;
    word-break: break-word;
    line-height: 1.2;
  }
  .song .status {
    font-size: 1.2rem;
    flex-shrink: 0;
  }

  audio { display: none; }

  /* ---------- Big buttons ---------- */
  .big-btn {
    display: block;
    margin: 14px auto 4px;
    padding: 10px 28px;
    font-size: 1.05rem;
    font-family: inherit;
    font-weight: bold;
    color: #fff;
    background: var(--pink);
    border: 5px outset var(--pink);
    cursor: pointer;
  }
  .big-btn:hover { background: var(--blue); border-color: var(--blue); }
  .big-btn:active { border-style: inset; }
  .big-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .message {
    text-align: center;
    font-size: 1rem;
    margin: 10px 0 0;
    min-height: 1.3em;
    color: var(--pink);
    font-weight: bold;
  }

  /* ---------- Celebration ---------- */
  .celebration {
    text-align: center;
    padding: 14px 8px;
    border: 4px dashed var(--pink);
    background: #fff;
  }
  .celebration h2 {
    font-size: 1.6rem;
    color: var(--blue);
    text-shadow: 2px 2px 0 var(--pink);
    animation: wiggle 1.5s ease-in-out infinite;
  }
  .celebration p {
    margin-top: 8px;
    font-size: 1rem;
    color: var(--ink);
  }

  /* ---------- Floating hearts ---------- */
  .hearts {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }
  .heart {
    position: absolute;
    font-size: 2rem;
    animation: floatUp linear forwards;
    user-select: none;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 1; }
    100% { transform: translateY(-110vh) rotate(720deg) scale(1.4); opacity: 0; }
  }

  /* ---------- Confetti ---------- */
  .confetti {
    position: fixed;
    top: -20px;
    width: 10px;
    height: 14px;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 9;
    border: 1px solid #000;
  }
  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.9; }
  }

  /* ---------- Already-listened screen ---------- */
  .done-screen {
    text-align: center;
    padding: 12px 4px;
    border: 4px dashed var(--green);
    background: #fff;
  }
  .done-screen .big-emoji {
    font-size: 3rem;
    display: inline-block;
    animation: bounce 1.5s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .done-screen h2 {
    font-size: 1.4rem;
    margin: 6px 0;
    color: var(--pink);
  }
  .done-screen p {
    font-size: 0.95rem;
    margin: 6px 0;
    color: var(--ink);
  }

  .footer-note {
    text-align: center;
    margin-top: 10px;
    font-size: 0.8rem;
    color: var(--ink);
    border-top: 3px dotted var(--blue);
    padding-top: 8px;
  }

  /* ---------- Mobile: компактный контейнер, фон виден сверху/снизу/по бокам ---------- */
  @media (max-width: 560px) {
    body { padding: 8px 8px; }
    .container {
      max-width: 92vw;
      padding: 12px 12px 14px;
    }
    .container::before { inset: 4px; border-width: 2px; }
    h1 { font-size: 1.5rem; }
    .greeting { font-size: 0.85rem; margin-bottom: 2px; }
    hr.divider { margin: 6px 0; border-top-width: 3px; }
    .streak { font-size: 0.8rem; padding: 4px 10px; border-width: 3px; }
    .songs { gap: 7px; margin-top: 4px; }
    .song { padding: 7px 9px; gap: 9px; border-width: 4px; }
    .play-btn { width: 34px; height: 34px; border-width: 3px; }
    .play-btn[data-state="play"]::before {
      border-left-width: 9px;
      border-top-width: 6px;
      border-bottom-width: 6px;
      margin-left: 2px;
    }
    .play-btn[data-state="pause"]::before,
    .play-btn[data-state="pause"]::after {
      width: 2.5px;
      height: 12px;
    }
    .song .emoji { font-size: 1.3rem; }
    .song .title { font-size: 0.8rem; }
    .song .status { font-size: 1rem; }
    .footer-note { font-size: 0.7rem; margin-top: 6px; padding-top: 5px; }
    .celebration h2 { font-size: 1.3rem; }
    .celebration p { font-size: 0.9rem; }
    .big-btn { font-size: 0.95rem; padding: 8px 22px; margin: 10px auto 2px; }
  }

  /* совсем маленькие экраны */
  @media (max-height: 640px) {
    h1 { font-size: 1.4rem; }
    .songs { gap: 6px; }
    .song { padding: 6px 8px; }
    .footer-note { display: none; }
  }
</style>
</head>
<body>

<div class="bg-grid" id="bgGrid"></div>
<div class="hearts" id="heartsLayer"></div>

<div class="container">
  <h1>~ Positive Project ~</h1>

  <hr class="divider">

  <div class="streak-wrap">
    <div class="streak" id="streak">Твой стрик: 0 дней</div>
  </div>

  <div id="main"></div>

  <p class="footer-note">🎶 Музыка исцеляет душу 🎶</p>
</div>

<script>
  // ---------- Data ----------
  const IMAGES = [
    "1.jpg","2.jpg","3.jpg","4.jpg","5.jpg","6.jpg","7.jpg","8.jpg","9.jpg","10.jpg",
    "11.jpg","12.jpg","13.jpg","14.jpg","15.jpg","16.jpg","17.jpg","18.jpg","19.jpg","20.jpg",
    "21.jpg","22.gif","23.jpg","24.jpg","25.jpg","26.jpg"
  ];

  const SONGS = [
    {
      title: "Katy Perry — Hot N Cold",
      emoji: "🎀",
      file: "music/Katy Perry - Hot N Cold (Audio) - KatvPerryMusic.mp3",
      quote: "♪ I would know and you over think ♪"
    },
    {
      title: "Nunta — Nicolae Guta",
      emoji: "💃",
      file: "music/Nunta - Nicolae Guta.mp3",
      quote: "♪ Tinerii să ne trăiască, cu muzică de valoare ♪"
    },
    {
      title: "Я убиваю эмореп — Арсений Креститель",
      emoji: "🖤",
      file: "music/Я убиваю эмореп - Арсений Креститель.mp3",
      quote: "♪ Я убиваю эмо-реп... ♪"
    },
    {
      title: "Вечен только джампстайл — мс улыбочка",
      emoji: "🕺",
      file: "music/Вечен только джампстайл - мс улыбочка.mp3",
      quote: "♪ Вечен только джампстайл ♪"
    },
    {
      title: "В этом мире зверей — Жарок",
      emoji: "🐾",
      file: "music/В этом мире зверей - Жарок.mp3",
      quote: "♪ В этом мире зверей ты детёныш ♪"
    },
    {
      title: "даунхилл — ssshhhiiittt!",
      emoji: "🚴",
      file: "music/даунхилл - ssshhhiiittt!.mp3",
      quote: "♪ Я бы так хотел рассказать о любви ♪"
    },
    {
      title: "скорлупа — источник",
      emoji: "🥚",
      file: "music/скорлупа - источник.mp3",
      quote: "♪ Хочу жить настоящим ♪"
    },
    {
      title: "ангел — конъюнктура",
      emoji: "🪽",
      file: "music/ангел.mp3",
      quote: "♪ Мне встретился ангел, у него самые добрые глаза ♪"
    }
  ];

  const FINAL_MESSAGES = [
    "Мари,ты крутая!",
    "Продолжай в том же духе",
    "Сегодня ты стала чуть-чуть счастливее, и это здорово!",
    "Positive Project гордится тобой 🦄"
  ];

  // ---------- Build background collage ----------
  function buildBackground() {
    const grid = document.getElementById("bgGrid");
    grid.innerHTML = "";
    const tile = window.innerWidth <= 560 ? 80 : 140;
    const cols = Math.ceil(window.innerWidth / tile) + 1;
    const rows = Math.ceil(window.innerHeight / tile) + 1;
    const total = cols * rows;
    // случайно вперемешку: для каждого тайла случайная картинка,
    // избегая повтора в соседней ячейке
    let prev = -1;
    for (let i = 0; i < total; i++) {
      let idx;
      do {
        idx = Math.floor(Math.random() * IMAGES.length);
      } while (idx === prev && IMAGES.length > 1);
      prev = idx;
      const img = document.createElement("img");
      img.src = "image/" + IMAGES[idx];
      img.loading = "lazy";
      img.alt = "";
      grid.appendChild(img);
    }
  }
  buildBackground();

  // ---------- Daily state ----------
  function todayKey() {
    const d = new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function yesterdayKey() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }

  function getState() {
    return {
      lastListen: localStorage.getItem("pp_lastListen"),
      streak: parseInt(localStorage.getItem("pp_streak") || "0", 10)
    };
  }
  function markListened() {
    const state = getState();
    let streak = state.streak;
    if (state.lastListen === yesterdayKey()) streak += 1;
    else if (state.lastListen === todayKey()) { /* keep */ }
    else streak = 1;
    localStorage.setItem("pp_lastListen", todayKey());
    localStorage.setItem("pp_streak", String(streak));
  }
  function updateStreakBadge() {
    const { streak } = getState();
    document.getElementById("streak").textContent = "🔥 Твой стрик: " + streak + (streak === 1 ? " день" : (streak >= 2 && streak <= 4 ? " дня" : " дней"));
  }

  // ---------- Render flow ----------
  const main = document.getElementById("main");

  function renderAlreadyDone() {
    main.innerHTML = `
      <div class="done-screen">
        <div class="big-emoji">🎉</div>
        <h2>Ты уже послушала сегодня!</h2>
        <p>Ты большая молодец!</p>
        <p style="font-size:2rem; margin-top: 14px;">💖🌸🦄🌈🐥</p>
        <button class="big-btn" id="againBtn">Хочу ещё раз!</button>
      </div>
    `;
    document.getElementById("againBtn").onclick = () => renderPlaylist(true);
    launchHearts(40);
  }

  function renderPlaylist(bonus=false) {
    let html = "";
    if (bonus) html += `<p class="message">Бонус-сессия!</p>`;
    html += `<div class="songs">`;
    SONGS.forEach((s, i) => {
      html += `
        <div class="song" data-i="${i}">
          <button class="play-btn" type="button" aria-label="Играть" data-state="play"></button>
          <div class="emoji">${s.emoji}</div>
          <div class="title">${s.title}</div>
          <div class="status">⏳</div>
        </div>
      `;
    });
    html += `</div>`;
    html += `<p class="message" id="msg">Выбери трек, который хочешь послушать</p>`;
    html += `<audio id="player" preload="none"></audio>`;
    main.innerHTML = html;

    const player = document.getElementById("player");
    const msg = document.getElementById("msg");
    const listened = new Set();
    let currentIndex = -1;

    function setBtn(i, state) {
      const el = document.querySelector(`.song[data-i="${i}"]`);
      if (el) el.querySelector(".play-btn").dataset.state = state;
    }

    function playSong(i) {
      // тап по играющему → пауза
      if (currentIndex === i && !player.paused && !player.ended) {
        player.pause();
        setBtn(i, "play");
        return;
      }
      // тап по текущему (на паузе) → продолжить
      if (currentIndex === i && player.paused && player.src) {
        player.play().catch(()=>{});
        setBtn(i, "pause");
        return;
      }
      // смена трека — сбрасываем предыдущий
      if (currentIndex !== -1) {
        const prev = document.querySelector(`.song[data-i="${currentIndex}"]`);
        if (prev) {
          prev.classList.remove("active");
          if (!prev.classList.contains("done")) setBtn(currentIndex, "play");
        }
      }
      const songEl = document.querySelector(`.song[data-i="${i}"]`);
      songEl.classList.add("active");
      setBtn(i, "pause");
      currentIndex = i;
      msg.textContent = SONGS[i].quote;
      player.src = SONGS[i].file;
      player.play().catch(()=>{});
      if (!bonus) {
        markListened();
        updateStreakBadge();
      }
    }

    document.querySelectorAll(".song").forEach(el => {
      const i = parseInt(el.dataset.i, 10);
      el.addEventListener("click", () => playSong(i));
      el.querySelector(".play-btn").addEventListener("click", (ev) => {
        ev.stopPropagation();
        playSong(i);
      });
    });

    player.onended = () => {
      if (currentIndex === -1) return;
      const finished = currentIndex;
      const el = document.querySelector(`.song[data-i="${finished}"]`);
      if (el) {
        el.classList.remove("active");
        el.classList.add("done");
        el.querySelector(".status").textContent = "✅";
        setBtn(finished, "play");
      }
      launchHearts(12);
      listened.add(finished);
      currentIndex = -1;

      if (listened.size === SONGS.length) {
        setTimeout(renderCelebration, 700);
        return;
      }

      // автопереход на следующий непрослушанный трек
      let next = -1;
      for (let k = 1; k <= SONGS.length; k++) {
        const candidate = (finished + k) % SONGS.length;
        if (!listened.has(candidate)) { next = candidate; break; }
      }
      if (next !== -1) {
        setTimeout(() => playSong(next), 900);
      }
    };
  }

  function renderCelebration() {
    updateStreakBadge();
    const fm = FINAL_MESSAGES[Math.floor(Math.random() * FINAL_MESSAGES.length)];
    main.innerHTML = `
      <div class="celebration">
        <h2>🎊 Ураааа! 🎊</h2>
        <p>${fm}</p>
        <p style="font-size:2.4rem; margin-top: 16px;">🦄💖🌈✨🐱🐶🧸</p>
        <button class="big-btn" id="againBtn">Ещё разочек 💕</button>
      </div>
    `;
    document.getElementById("againBtn").onclick = () => renderPlaylist(true);
    partyMode();
  }

  // ---------- Effects ----------
  function launchHearts(n) {
    const layer = document.getElementById("heartsLayer");
    const emojis = ["💖","💕","💗","💘","🌸","✨","🌷","🦄","🎀","⭐"];
    for (let i = 0; i < n; i++) {
      const h = document.createElement("div");
      h.className = "heart";
      h.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      h.style.left = (Math.random() * 100) + "vw";
      h.style.bottom = "-40px";
      h.style.fontSize = (1.2 + Math.random() * 2) + "rem";
      h.style.animationDuration = (3 + Math.random() * 3) + "s";
      layer.appendChild(h);
      setTimeout(() => h.remove(), 7000);
    }
  }

  function partyMode() {
    launchHearts(60);
    const colors = ["#ff477e","#ff6fae","#b794f4","#4cc9f0","#caffbf","#fff3b0","#ffd3e0"];
    for (let i = 0; i < 120; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = (Math.random() * 100) + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";
      c.style.animationDelay = (Math.random() * 1.2) + "s";
      c.style.transform = "rotate(" + (Math.random()*360) + "deg)";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 6000);
    }
  }

  // ---------- Init ----------
  updateStreakBadge();
  const state = getState();
  if (state.lastListen === todayKey()) {
    renderAlreadyDone();
  } else {
    renderPlaylist(false);
  }

  // re-tile background on resize
  let resizeTimer;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildBackground, 300);
  });
</script>
</body>
</html>
